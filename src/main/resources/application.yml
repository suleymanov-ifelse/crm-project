# CRM — PostgreSQL + Hibernate create-drop
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/crm
    username: crm
    password: crm
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080
